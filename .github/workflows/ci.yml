name: CI - Build & Test Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build-web-crm:
    name: Build & Test web-crm (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-crm
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run Unit Tests
        run: pnpm --filter ./apps/web-crm test
        working-directory: .

      - name: Build
        run: pnpm build:web
        working-directory: .

  test-and-build-api-crm:
    name: Build & Test api-crm (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-crm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Run Unit Tests
        run: dotnet test tests/Crm.Api.Tests/Crm.Api.Tests.csproj -c Release --no-build --verbosity normal

  test-and-build-api-ai-analytics:
    name: Build & Test api-ai-analytics (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-ai-analytics
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api-ai-analytics/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Verify app loads
        run: |
          python -c "from app.main import app; print('OK: app loads successfully')"

      - name: Run Unit Tests
        run: pytest
        env:
          PYTHONPATH: .
